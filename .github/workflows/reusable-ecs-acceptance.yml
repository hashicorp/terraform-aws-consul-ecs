name: reusable-ecs-acceptance

on:
  workflow_call:
    inputs:
      name:
        description: "The name of the job that runs the tests"
        required: true
        type: string
      go-version:
        description: "Version of Go to use to run the tests"
        required: true
        type: string
      launch-type:
        description: "The ECS launch type. Can be either EC2 or FARGATE"
        required: false
        type: string
        default: "FARGATE"
      consul-version:
        required: false
        type: string
        default: "1.22.5"
      enable-hcp:
        description: "Whether to create a HCP cluster for running acceptance tests"
        required: true
        type: boolean


env:
  TEST_RESULTS: /tmp/test-results
  GOTESTSUM_VERSION: 1.8.0
  CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
  HCP_CLIENT_ID: ${{ secrets.HCP_CLIENT_ID }}
  HCP_CLIENT_SECRET: ${{ secrets.HCP_CLIENT_SECRET }}

jobs:
  acceptance-tests:
    name: ${{ inputs.name }}
    runs-on: ['ubuntu-latest']
    defaults:
      run:
        working-directory: ./test/acceptance
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: ./test/acceptance/go.sum
    - name: Install base apps
      run: |
        sudo apt-get install -y expect openssl jq
    - name: Install gotestsum
      run: |
        curl -sSL "https://github.com/gotestyourself/gotestsum/releases/download/v${{ env.GOTESTSUM_VERSION }}/gotestsum_${{ env.GOTESTSUM_VERSION }}_linux_amd64.tar.gz" | \
        tar -xz --overwrite -C /usr/local/bin gotestsum
    - name: Install AWS CLI
      run: |
        curl "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
        sudo dpkg -i session-manager-plugin.deb
        aws --version
        echo session-manager-plugin version "$(session-manager-plugin --version)"
    - name: Install AWS ECS CLI
      run: |
        curl -sSL "https://amazon-ecs-cli.s3.amazonaws.com/ecs-cli-linux-amd64-latest" -o /usr/local/bin/ecs-cli
        chmod +x /usr/local/bin/ecs-cli
        ecs-cli --version
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "~1.5"
    - name: Assume AWS IAM Role
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        role-to-assume: ${{ secrets.AWS_ECS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_ECS_REGION }}
        aws-access-key-id: ${{ secrets.AWS_ECS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_ECS_SECRET_ACCESS_KEY }}
        role-duration-seconds: 7200
    - name: Pre-cleanup orphaned VPCs
      if: always()
      run: |
        set +e
        echo "Checking for orphaned VPCs from previous test runs..."
        
        # List all VPCs
        VPCS=$(aws ec2 describe-vpcs --query "Vpcs[*].[VpcId,Tags[?Key=='Name'].Value|[0]]" --output text 2>/dev/null || echo "")
        
        if [ -z "$VPCS" ]; then
          echo "No VPCs found"
          exit 0
        fi
        
        echo "Found VPCs:"
        echo "$VPCS"
        
        # Count current VPCs
        VPC_COUNT=$(aws ec2 describe-vpcs --query "length(Vpcs)" --output text 2>/dev/null || echo "0")
        echo "Current VPC count: $VPC_COUNT / 5 (AWS limit)"
        
        if [ "$VPC_COUNT" -ge 5 ]; then
          echo "WARNING: At or near VPC limit ($VPC_COUNT/5), attempting cleanup of consul-ecs VPCs..."
          
          # Clean up consul-ecs VPCs that are likely from old test runs
          for vpc_id in $(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=consul-ecs-*" --query "Vpcs[*].VpcId" --output text 2>/dev/null); do
            echo "Cleaning up old test VPC: $vpc_id"
            
            # Get all resources associated with this VPC
            SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc_id" --query "Subnets[*].SubnetId" --output text 2>/dev/null)
            for subnet in $SUBNETS; do
              echo "  - Deleting subnet: $subnet"
              aws ec2 delete-subnet --subnet-id "$subnet" 2>/dev/null || true
            done
            
            IGWs=$(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$vpc_id" --query "InternetGateways[*].InternetGatewayId" --output text 2>/dev/null)
            for igw in $IGWs; do
              echo "  - Detaching IGW: $igw"
              aws ec2 detach-internet-gateway --internet-gateway-id "$igw" --vpc-id "$vpc_id" 2>/dev/null || true
              aws ec2 delete-internet-gateway --internet-gateway-id "$igw" 2>/dev/null || true
            done
            
            RTBs=$(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc_id" --query "RouteTables[?Associations[0].Main!=\`true\`].RouteTableId" --output text 2>/dev/null)
            for rtb in $RTBs; do
              echo "  - Deleting route table: $rtb"
              aws ec2 delete-route-table --route-table-id "$rtb" 2>/dev/null || true
            done
            
            echo "  - Deleting VPC: $vpc_id"
            aws ec2 delete-vpc --vpc-id "$vpc_id" 2>/dev/null || true
          done
        fi
        set -e
    - name: terraform init & apply
      run: |
        cd setup-terraform/
        VARS="-var tags={\"build_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
        VARS+=' -var launch_type=${{ inputs.launch-type }}'
        VARS+=' -var consul_version=${{ inputs.consul-version }}'
        VARS+=' -var hcp_project_id=${{ secrets.HCP_PROJECT_ID }}'
        case $GITHUB_REF_NAME in
            main | release/*) VARS+=" -var enable_hcp=${{ inputs.enable-hcp }}";;
            *) VARS+=" -var enable_hcp=false";;
        esac
        terraform init
        terraform apply -auto-approve $VARS
    - name: Acceptance tests
      run: |
        mkdir -p "$TEST_RESULTS"
        cd tests/
        gotestsum --junitfile "$TEST_RESULTS/gotestsum-report.xml" --format standard-verbose -- ./... -p 1 -timeout 1h -v -failfast
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: acceptance-test-results-${{ inputs.name }}
        path: ${{ env.TEST_RESULTS }}/gotestsum-report.xml
    - name: terraform destroy
      if: always()
      run: |
        cd setup-terraform/
        VARS="-var tags={\"build_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}"
        VARS+=' -var launch_type=${{ inputs.launch-type }}'
        VARS+=' -var consul_version=${{ inputs.consul-version }}'
        VARS+=' -var hcp_project_id=${{ secrets.HCP_PROJECT_ID }}'
        case $GITHUB_REF_NAME in
            main | release/*) VARS+=" -var enable_hcp=${{ inputs.enable-hcp }}";;
            *) VARS+=" -var enable_hcp=false";;
        esac
        terraform destroy -auto-approve -lock=false $VARS || echo "Terraform destroy encountered an error, attempting to continue..."
        
    - name: Cleanup AWS resources
      if: always()
      run: |
        set +e
        echo "Cleaning up VPCs and related resources..."
        # Get all VPCs with the test tag
        BUILD_TAG="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
        for vpc_id in $(aws ec2 describe-vpcs --filters Name=tag:build_url,Values="$BUILD_TAG" --query "Vpcs[*].VpcId" --output text 2>/dev/null); do
          echo "Found VPC: $vpc_id, attempting cleanup..."
          
          # Delete all route tables except default
          for rtb in $(aws ec2 describe-route-tables --filters Name=vpc-id,Values="$vpc_id" --query "RouteTables[?Associations[0].Main!=\`true\`].RouteTableId" --output text 2>/dev/null); do
            echo "  - Deleting route table: $rtb"
            aws ec2 delete-route-table --route-table-id "$rtb" 2>/dev/null || true
          done
          
          # Detach and delete internet gateways
          for igw in $(aws ec2 describe-internet-gateways --filters Name=attachment.vpc-id,Values="$vpc_id" --query "InternetGateways[*].InternetGatewayId" --output text 2>/dev/null); do
            echo "  - Detaching IGW: $igw"
            aws ec2 detach-internet-gateway --internet-gateway-id "$igw" --vpc-id "$vpc_id" 2>/dev/null || true
            aws ec2 delete-internet-gateway --internet-gateway-id "$igw" 2>/dev/null || true
          done
          
          # Delete subnets
          for subnet in $(aws ec2 describe-subnets --filters Name=vpc-id,Values="$vpc_id" --query "Subnets[*].SubnetId" --output text 2>/dev/null); do
            echo "  - Deleting subnet: $subnet"
            aws ec2 delete-subnet --subnet-id "$subnet" 2>/dev/null || true
          done
          
          # Delete security groups (except default)
          for sg in $(aws ec2 describe-security-groups --filters Name=vpc-id,Values="$vpc_id" --query "SecurityGroups[?GroupName!='default'].GroupId" --output text 2>/dev/null); do
            echo "  - Deleting security group: $sg"
            aws ec2 delete-security-group --group-id "$sg" 2>/dev/null || true
          done
          
          # Delete network ACLs (except default)
          for nacl in $(aws ec2 describe-network-acls --filters Name=vpc-id,Values="$vpc_id" --query "NetworkAcls[?IsDefault==\`false\`].NetworkAclId" --output text 2>/dev/null); do
            echo "  - Deleting network ACL: $nacl"
            aws ec2 delete-network-acl --network-acl-id "$nacl" 2>/dev/null || true
          done
          
          # Delete the VPC
          echo "  - Deleting VPC: $vpc_id"
          aws ec2 delete-vpc --vpc-id "$vpc_id" 2>/dev/null || true
        done
        
        # Final check: list remaining VPCs
        echo ""
        REMAINING_COUNT=$(aws ec2 describe-vpcs --query "length(Vpcs)" --output text 2>/dev/null || echo "unknown")
        echo "VPC cleanup completed. Remaining VPCs: $REMAINING_COUNT/5"
        set -e
